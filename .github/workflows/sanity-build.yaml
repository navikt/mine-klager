name: Sanity Build

on: [pull_request]

jobs:
  sanity-build:
    name: Sanity Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          registries: |
            https://registry.npmjs.org/
            @navikt:https://npm.pkg.github.com|$TOKEN

      - name: Install dependencies
        shell: bash
        env:
          TOKEN: ${{ secrets.READER_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Typecheck
        shell: bash
        run: bun run typecheck

      - name: Lint
        shell: bash
        run: bun run lint

      - name: Test
        if: false # No unit tests yet
        shell: bash
        run: bun test
